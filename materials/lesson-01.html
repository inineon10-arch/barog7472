<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>오답 단어장 - 김균하</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --card: #ffffff;
    --accent: #2d5be3;
    --accent2: #e3502d;
    --wrong-col: #d94040;
    --blank-col: #d97a20;
    --text: #1a1a2e;
    --text2: #6b6b80;
    --muted: #b0aab8;
    --border: #e2dcd8;
    --tip-bg: #eef3ff;
    --tip-border: #b8ccff;
    --ex-bg: #faf8f5;
    --green: #1a9e6f;
    --pill-wrong: #fff0f0;
    --pill-blank: #fff5e8;
  }

  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
    touch-action: pan-y;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .header {
    flex-shrink: 0;
    padding: 12px 16px 8px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
  }
  .header-left { min-width: 0; flex: 1; }
  .header-left .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-left .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
    letter-spacing: -0.5px;
  }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .index-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }
  .index-display span { color: var(--muted); font-weight: 400; }

  .prog-wrap { flex-shrink: 0; padding: 0 16px 10px; }
  .prog-dots { display: flex; justify-content: space-between; gap: 3px; }
  .pdot {
    flex: 1; height: 4px; border-radius: 3px;
    background: var(--border); transition: background 0.3s;
  }
  .pdot.done { background: var(--accent); }
  .pdot.current { background: var(--accent); opacity: 0.4; }

  .card-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
  }

  .flash-card {
    position: absolute;
    width: calc(100% - 24px);
    max-width: 430px;
    height: calc(100% - 10px);
    max-height: 620px;
    will-change: transform, opacity;
    cursor: pointer;
    touch-action: pan-y;
  }

  .card-face {
    width: 100%; height: 100%;
    background: var(--card);
    border-radius: 22px;
    border: 1.5px solid var(--border);
    box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .card-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; }
  .line-wrong { background: linear-gradient(90deg, var(--wrong-col) 0%, #ff9980 100%); }
  .line-blank { background: linear-gradient(90deg, var(--blank-col) 0%, #ffd080 100%); }

  .card-content {
    flex: 1; padding: 16px 18px 12px;
    display: flex; flex-direction: column;
    overflow: hidden; min-height: 0;
  }

  .face-meaning, .face-word {
    display: flex; flex-direction: column; height: 100%; min-height: 0;
  }

  .scroll-area {
    flex: 1; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    overscroll-behavior: contain;
    scrollbar-width: thin;
  }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; flex-shrink: 0; }
  .badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.58rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px;
  }
  .b-num { background: var(--border); color: var(--text2); }
  .b-wrong { background: var(--pill-wrong); color: var(--wrong-col); border: 1px solid #ffcccc; }
  .b-blank { background: var(--pill-blank); color: var(--blank-col); border: 1px solid #ffddb0; }
  .b-pos { background: #f0f0ff; color: var(--accent); border: 1px solid #d0d8ff; }
  .b-src1 { background: #f0fff8; color: #1a9e6f; border: 1px solid #b0e8cc; }
  .b-src2 { background: #f5f0ff; color: #6a3fb5; border: 1px solid #d0b8ff; }

  .meaning-center {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; gap: 8px; padding: 10px 0; min-height: 120px;
  }
  .meaning-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.58rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .meaning-text { font-size: 1.85rem; font-weight: 400; color: var(--text); line-height: 1.3; letter-spacing: -0.5px; }

  .word-center {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; gap: 6px; padding: 10px 0; min-height: 120px;
  }
  .word-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.58rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .word-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem; font-weight: 700;
    color: var(--text); letter-spacing: -1px; line-height: 1.1; word-break: break-word;
  }
  .word-pos { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }

  .student-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; padding: 8px 12px;
    background: var(--pill-wrong); border-radius: 10px;
    border: 1px solid #ffcccc; flex-shrink: 0;
  }
  .student-row.blank-row { background: var(--pill-blank); border-color: #ffddb0; }
  .student-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.58rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--wrong-col); flex-shrink: 0;
  }
  .blank-row .student-label { color: var(--blank-col); }
  .student-ans { font-size: 0.82rem; color: var(--wrong-col); text-decoration: line-through; text-decoration-color: rgba(217,64,64,0.5); }
  .blank-ans { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  .tip-box {
    background: var(--tip-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 9px 13px; font-size: 0.74rem;
    color: #3a5ab0; line-height: 1.6;
    margin-top: 10px; flex-shrink: 0;
  }
  .tip-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.58rem; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 5px;
  }
  .example-box {
    background: var(--ex-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 13px; font-size: 0.72rem;
    color: var(--text2); line-height: 1.65;
    font-style: italic; margin-top: 7px; flex-shrink: 0;
  }
  .example-box em { color: var(--accent2); font-style: normal; font-weight: 600; }

  .tap-hint {
    text-align: center; font-size: 0.62rem;
    color: var(--muted); letter-spacing: 0.5px;
    padding-top: 8px; padding-bottom: 2px;
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; gap: 5px;
  }
  .tap-hint::before, .tap-hint::after {
    content: ''; display: inline-block;
    width: 18px; height: 1px; background: var(--border);
  }

  .nav-hint {
    flex-shrink: 0; display: flex;
    justify-content: space-between; align-items: center;
    padding: 8px 20px 10px;
  }
  .nav-item { display: flex; align-items: center; gap: 5px; font-size: 0.63rem; color: var(--muted); letter-spacing: 0.5px; }
  .nav-arrow { font-size: 0.95rem; color: var(--border); }
  .nav-center { font-size: 0.63rem; color: var(--muted); }

  .flash-card { transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .flash-card.no-transition { transition: none !important; }
  .flash-card.dragging { transition: none !important; }

  .swipe-indicator {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 16px; border-radius: 10px;
    opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.1s;
  }
  .ind-prev { left: 16px; color: var(--accent); background: rgba(45,91,227,0.08); border: 1.5px solid rgba(45,91,227,0.2); }
  .ind-next { right: 16px; color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .ind-up { top: 16px !important; left: 50% !important; transform: translateX(-50%) !important; color: var(--green); background: rgba(26,158,111,0.08); border: 1.5px solid rgba(26,158,111,0.2); }
  .ind-down { bottom: 16px !important; left: 50% !important; transform: translateX(-50%) !important; color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }

  .random-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
    padding: 8px 13px; border-radius: 18px;
    border: 1.5px solid var(--accent2);
    background: transparent; color: var(--accent2);
    cursor: pointer; transition: all 0.2s; min-height: 36px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .random-btn:active { transform: scale(0.93); background: var(--pill-wrong); }
  .random-btn.shuffled { background: var(--accent2); color: #fff; }

  .mode-chip { display: inline-flex; align-items: center; gap: 2px; background: var(--border); border-radius: 22px; padding: 3px; }
  .mode-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem; font-weight: 600; letter-spacing: 0.5px;
    padding: 8px 12px; border-radius: 18px;
    border: none; background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s; min-height: 36px; min-width: 60px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .end-card {
    position: absolute;
    width: calc(100% - 24px); max-width: 430px;
    height: calc(100% - 10px); max-height: 620px;
    will-change: transform, opacity; touch-action: pan-y;
    transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s;
  }
  .end-card.no-transition { transition: none !important; }
  .end-card.dragging { transition: none !important; }
  .end-face {
    width: 100%; height: 100%;
    background: var(--card); border-radius: 22px;
    border: 1.5px solid var(--border);
    box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .end-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; background: linear-gradient(90deg, var(--accent) 0%, #6a8eff 50%, var(--green) 100%); }
  .end-content {
    flex: 1; padding: 24px 22px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 18px; overflow: hidden;
  }
  .end-emoji { font-size: 3.4rem; line-height: 1; animation: pop 0.6s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  .end-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .end-title { font-size: 1.55rem; font-weight: 400; color: var(--text); line-height: 1.35; letter-spacing: -0.5px; margin-top: -6px; }
  .end-subtitle { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .restart-btn {
    margin-top: 6px; background: var(--accent); color: #fff;
    border: none; border-radius: 16px; padding: 14px 32px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 4px 16px rgba(45,91,227,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent; touch-action: pan-y;
    min-height: 48px; display: inline-flex; align-items: center; gap: 8px;
  }
  .restart-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(45,91,227,0.2); }
  .end-hint { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.3px; margin-top: 2px; }
  .pdot.done.all { background: var(--green); }

  @media (max-height: 700px) {
    .meaning-text { font-size: 1.6rem; }
    .word-text { font-size: 2.1rem; }
    .meaning-center, .word-center { min-height: 100px; padding: 6px 0; }
    .badges { margin-bottom: 8px; }
    .tip-box, .example-box { font-size: 0.7rem; padding: 8px 11px; }
  }
  @media (max-height: 600px) {
    .header { padding: 8px 16px 6px; }
    .header-left .title { font-size: 1.05rem; }
    .meaning-text { font-size: 1.4rem; }
    .word-text { font-size: 1.85rem; }
    .nav-hint { padding: 6px 20px 8px; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-left">
      <div class="name">김균하 · 오답 단어장</div>
      <div class="title">DAY 16–25 + DAY 26–27</div>
    </div>
    <div class="header-right">
      <div class="index-display"><span id="cur">1</span> <span>/ <span id="tot">0</span></span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="random-btn" id="btn-random" type="button">🔀 랜덤</button>
        <div class="mode-chip">
          <button class="mode-btn active" id="btn-word" type="button">단어→뜻</button>
          <button class="mode-btn" id="btn-meaning" type="button">뜻→단어</button>
        </div>
      </div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-dots" id="prog-dots"></div>
  </div>

  <div class="card-viewport" id="viewport">
    <div class="swipe-indicator ind-prev" id="ind-prev">← 이전</div>
    <div class="swipe-indicator ind-next" id="ind-next">다음 →</div>
    <div class="swipe-indicator ind-up" id="ind-up">↑ 뒤집기</div>
    <div class="swipe-indicator ind-down" id="ind-down">↓ 뒤집기</div>
  </div>

  <div class="nav-hint">
    <div class="nav-item"><span class="nav-arrow">→</span> 이전 단어</div>
    <div class="nav-center">탭·위아래스와이프 = 뒤집기</div>
    <div class="nav-item">다음 단어 <span class="nav-arrow">←</span></div>
  </div>

</div>

<script>
// DAY 26/27 오답 + 미기재 (시험1)
// DAY 16-25 오답 + 미기재 (시험2)
const cards = [
  // ── DAY 26/27 오답 ──
  { num:7,  word:'complement',  pos:'동사/명사', type:'wrong', src:'A',
    correct:'보완하다, 보완물', student:'충실한',
    tip:'complement = 서로 완성시켜주는 것 (≠ compliment 칭찬)',
    example:'The wine <em>complements</em> the meal perfectly.' },

  { num:9,  word:'defect',      pos:'명사', type:'wrong', src:'A',
    correct:'결함, 결점', student:'무너지다',
    tip:'defect = 완벽하지 못한 부분',
    example:'The product had a manufacturing <em>defect</em>.' },

  { num:13, word:'considerable', pos:'형용사', type:'wrong', src:'A',
    correct:'상당한', student:'숙련하다',
    tip:'consider(고려하다) + able → 고려할 만큼 큰 → 상당한',
    example:'He has <em>considerable</em> experience.' },

  { num:18, word:'considerate', pos:'형용사', type:'wrong', src:'A',
    correct:'배려하는', student:'고려하다',
    tip:'considerate = 남을 생각하는 (≠ considerable 상당한)',
    example:'She is very <em>considerate</em> of others.' },

  { num:20, word:'optical',     pos:'형용사', type:'wrong', src:'A',
    correct:'눈의, 광학의', student:'낙천적인',
    tip:'opt = 눈 → optical = 눈/빛 관련',
    example:'An <em>optical</em> illusion tricks the eye.' },

  { num:22, word:'contract',    pos:'명사/동사', type:'wrong', src:'A',
    correct:'계약, 수축하다', student:'연락하다',
    tip:'contract = 계약서 / 근육이 수축하다',
    example:'Sign the <em>contract</em> before starting.' },

  { num:28, word:'scared',      pos:'형용사', type:'wrong', src:'A',
    correct:'겁먹은, 무서워하는', student:'신성한',
    tip:'scared = fear(두려움)의 감정 상태 (≠ sacred 신성한)',
    example:'She was <em>scared</em> of the dark.' },

  { num:29, word:'sacred',      pos:'형용사', type:'wrong', src:'A',
    correct:'신성한', student:'무서운',
    tip:'sacred = 종교적으로 거룩한 (≠ scared 두려워하는)',
    example:'This is a <em>sacred</em> place.' },

  { num:35, word:'vain',        pos:'형용사', type:'wrong', src:'A',
    correct:'허영심 있는, 헛된', student:'동맥',
    tip:'in vain = 헛되이 / vain = 자기중심적인',
    example:'All her efforts were in <em>vain</em>.' },

  { num:39, word:'respective',  pos:'형용사', type:'wrong', src:'A',
    correct:'각각의', student:'시작하다',
    tip:'respective = 각자에게 해당하는',
    example:'They went to their <em>respective</em> rooms.' },

  { num:43, word:'grave',       pos:'명사/형용사', type:'wrong', src:'A',
    correct:'무덤, 심각한', student:'귀라',
    tip:'grave = 무덤 / 상황이 심각한',
    example:'The situation was <em>grave</em>.' },

  // ── DAY 26/27 미기재 ──
  { num:3,  word:'literary',    pos:'형용사', type:'blank', src:'A',
    correct:'문학의', student:'',
    tip:'literature(문학) → literary(문학의)',
    example:'She has a <em>literary</em> talent.' },

  { num:5,  word:'corporation', pos:'명사', type:'blank', src:'A',
    correct:'기업, 회사', student:'',
    tip:'corp = 몸/집단 → corporation = 법인, 회사',
    example:'He works for a large <em>corporation</em>.' },

  { num:21, word:'call for',    pos:'구동사', type:'blank', src:'A',
    correct:'요구하다, 필요로 하다', student:'',
    tip:'call for = ~을 요청/요구하다',
    example:'The situation <em>calls for</em> immediate action.' },

  { num:24, word:'literate',    pos:'형용사', type:'blank', src:'A',
    correct:'글을 읽고 쓸 줄 아는', student:'',
    tip:'liter = 글자 → literate = 문해력이 있는',
    example:'Everyone should be <em>literate</em>.' },

  { num:46, word:'yield',       pos:'동사/명사', type:'blank', src:'A',
    correct:'산출하다, 양보하다', student:'',
    tip:'yield = 결과를 내다 / 길을 양보하다',

let idx = 0;
let startFace = 'word';
let showingBack = false;
let isAnimating = false;

function setStartFace(mode) {
  if (isAnimating) return;
  startFace = mode;
  showingBack = false;
  document.getElementById('btn-meaning').classList.toggle('active', mode === 'meaning');
  document.getElementById('btn-word').classList.toggle('active', mode === 'word');
  if (idx >= cards.length) return;
  renderCard(0);
}
document.getElementById('btn-meaning').addEventListener('click', () => setStartFace('meaning'));
document.getElementById('btn-word').addEventListener('click', () => setStartFace('word'));

const originalCards = [...cards];
let isShuffled = false;
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
document.getElementById('btn-random').addEventListener('click', function() {
  if (isAnimating) return;
  haptic(20);
  if (!isShuffled) {
    const s = shuffleArray(cards); cards.length = 0; s.forEach(c => cards.push(c));
    isShuffled = true; this.classList.add('shuffled'); this.textContent = '🔀 랜덤ON';
  } else {
    cards.length = 0; originalCards.forEach(c => cards.push(c));
    isShuffled = false; this.classList.remove('shuffled'); this.textContent = '🔀 랜덤';
  }
  idx = 0; showingBack = false; buildDots(); renderCard(0);
});

function buildDots() {
  const wrap = document.getElementById('prog-dots');
  wrap.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot'; d.id = `dot-${i}`; wrap.appendChild(d);
  });
  updateDots();
}

function updateDots() {
  const isEnd = idx >= cards.length;
  cards.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    if (isEnd) d.className = 'pdot done all';
    else d.className = 'pdot' + (i < idx ? ' done' : i === idx ? ' current' : '');
  });
  document.getElementById('cur').textContent = isEnd ? '✓' : (idx + 1);
  document.getElementById('tot').textContent = cards.length;
}

function buildCardHTML(card) {
  const srcClass = card.src === 'A' ? 'b-src1' : 'b-src2';
  const srcLabel = card.src === 'A' ? 'DAY 26/27' : 'DAY 16–25';
  const typeClass = card.type === 'blank' ? 'b-blank' : 'b-wrong';
  const typeLabel = card.type === 'blank' ? '미기재' : '오답';

  const badgesHTML = `
    <div class="badges">
      <span class="badge b-num">No.${card.num}</span>
      <span class="badge ${typeClass}">${typeLabel}</span>
      <span class="badge b-pos">${card.pos}</span>
      <span class="badge ${srcClass}">${srcLabel}</span>
    </div>`;

  const isBlank = card.type === 'blank';
  const studentHTML = isBlank
    ? `<div class="student-row blank-row"><span class="student-label">미기재</span><span class="blank-ans">답을 쓰지 않았어요</span></div>`
    : `<div class="student-row"><span class="student-label">내 답</span><span class="student-ans">${card.student}</span></div>`;

  const lineClass = isBlank ? 'line-blank' : 'line-wrong';

  const WORD_FACE = `
    <div class="card-line ${lineClass}"></div>
    <div class="card-content">
      <div class="face-word">
        ${badgesHTML}
        <div class="word-center">
          <div class="word-label">영단어</div>
          <div class="word-text">${card.word}</div>
          <div class="word-pos">${card.pos}</div>
        </div>
        <div class="tap-hint">탭해서 뜻 보기</div>
      </div>
    </div>`;

  const WORD_BACK = `
    <div class="card-line ${lineClass}"></div>
    <div class="card-content">
      <div class="face-word">
        ${badgesHTML}
        <div class="scroll-area">
          <div class="word-center" style="min-height:80px">
            <div class="word-label">영단어</div>
            <div class="word-text" style="font-size:1.7rem">${card.word}</div>
          </div>
          <div class="meaning-label" style="text-align:center;margin-bottom:6px">뜻</div>
          <div class="meaning-text" style="text-align:center;font-size:1.4rem;margin-bottom:10px">${card.correct}</div>
          ${studentHTML}
          <div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div>
          <div class="example-box">${card.example}</div>
        </div>
        <div class="tap-hint">탭해서 영단어 보기</div>
      </div>
    </div>`;

  const MEANING_FACE = `
    <div class="card-line ${lineClass}"></div>
    <div class="card-content">
      <div class="face-meaning">
        ${badgesHTML}
        <div class="meaning-center">
          <div class="meaning-label">뜻</div>
          <div class="meaning-text">${card.correct}</div>
        </div>
        <div class="tap-hint">탭해서 영단어 보기</div>
      </div>
    </div>`;

  const MEANING_BACK = `
    <div class="card-line ${lineClass}"></div>
    <div class="card-content">
      <div class="face-meaning">
        ${badgesHTML}
        <div class="scroll-area">
          <div class="word-center" style="min-height:100px">
            <div class="word-label">영단어</div>
            <div class="word-text">${card.word}</div>
            <div class="word-pos">${card.pos}</div>
          </div>
          ${studentHTML}
          <div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div>
          <div class="example-box">${card.example}</div>
        </div>
        <div class="tap-hint">탭해서 뜻 보기</div>
      </div>
    </div>`;

  return startFace === 'meaning'
    ? { frontHTML: MEANING_FACE, backHTML: MEANING_BACK }
    : { frontHTML: WORD_FACE, backHTML: WORD_BACK };
}

function buildEndHTML() {
  return `
    <div class="end-face">
      <div class="end-line"></div>
      <div class="end-content">
        <div class="end-emoji">🎉</div>
        <div>
          <div class="end-label">All Done</div>
          <div class="end-title">학습을 모두 마쳤어요!</div>
        </div>
        <div class="end-subtitle">
          오답 단어 ${cards.length}개를 모두 복습했어요.<br>
          한 번 더 반복하면 더욱 확실해져요 ✨
        </div>
        <button class="restart-btn" id="restart-btn" type="button">
          <span>↻</span><span>다시 시작하기</span>
        </button>
        <div class="end-hint">→ 스와이프하면 마지막 카드로 돌아가요</div>
      </div>
    </div>`;
}

let cardEl = null;

function renderCard(direction) {
  const vp = document.getElementById('viewport');
  const old = vp.querySelector('.flash-card, .end-card');
  const isEnd = idx >= cards.length;
  const el = document.createElement('div');

  if (isEnd) {
    el.className = 'end-card no-transition';
    el.innerHTML = buildEndHTML();
  } else {
    const card = cards[idx];
    const { frontHTML, backHTML } = buildCardHTML(card);
    el.className = 'flash-card no-transition';
    el.dataset.front = 'true';
    el.innerHTML = `<div class="card-face">${showingBack ? backHTML : frontHTML}</div>`;
  }

  if (direction !== 0) { el.style.transform = `translateX(${direction > 0 ? '100%' : '-100%'})`; isAnimating = true; }

  vp.appendChild(el);
  cardEl = el;

  if (isEnd) {
    const btn = el.querySelector('#restart-btn');
    if (btn) btn.addEventListener('click', restart);
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => { el.classList.remove('no-transition'); el.style.transform = 'translateX(0)'; });
  });

  if (old) {
    old.classList.remove('no-transition');
    old.style.transform = `translateX(${direction > 0 ? '-100%' : '100%'})`;
    old.style.opacity = '0.3';
    setTimeout(() => { if (old.parentNode) old.remove(); isAnimating = false; }, 350);
  } else { isAnimating = false; }

  updateDots();
}

function restart() {
  if (isAnimating) return;
  idx = 0; showingBack = false; haptic(15); renderCard(-1);
}

function flipCard(el) {
  if (!el || isAnimating || idx >= cards.length) return;
  if (!el.querySelector('.card-face')) return;
  showingBack = !showingBack;
  const card = cards[idx];
  const { frontHTML, backHTML } = buildCardHTML(card);
  const content = el.querySelector('.card-face');
  content.style.transition = 'transform 0.15s ease';
  content.style.transform = 'scale(0.97)';
  setTimeout(() => { content.innerHTML = showingBack ? backHTML : frontHTML; content.style.transform = 'scale(1)'; }, 80);
  setTimeout(() => { content.style.transition = ''; }, 230);
}

function haptic(ms = 8) { try { if (window.navigator && navigator.vibrate) navigator.vibrate(ms); } catch(_) {} }

function initInteraction() {
  const vp = document.getElementById('viewport');
  if (!vp) return;
  let startX = 0, startY = 0, startTime = 0;
  let lastX = 0, lastY = 0, tracking = false, hasMoved = false;
  let lockedDirection = null, pointerId = null;
  const DIR_LOCK = 8, TAP_T = 8, SWIPE_D = 60, SWIPE_VD = 30, SWIPE_TIME = 350, V_D = 45, V_VD = 25;

  function getCard() { return vp.querySelector('.flash-card, .end-card'); }
  function startTracking(x, y) {
    if (isAnimating) return false;
    tracking = true; hasMoved = false; lockedDirection = null;
    startX = x; lastX = x; startY = y; lastY = y; startTime = Date.now();
    const c = getCard(); if (c) c.classList.add('dragging'); return true;
  }
  function moveTracking(x, y, ev) {
    if (!tracking) return;
    const dx = x - startX, dy = y - startY; lastX = x; lastY = y;
    if (lockedDirection === null) {
      if (Math.abs(dx) > DIR_LOCK || Math.abs(dy) > DIR_LOCK)
        lockedDirection = Math.abs(dx) > Math.abs(dy) * 1.1 ? 'h' : Math.abs(dy) > Math.abs(dx) * 1.1 ? 'v' : 'h';
    }
    if (lockedDirection === 'h') {
      if (ev && ev.cancelable && ev.type === 'touchmove') ev.preventDefault();
      hasMoved = true;
      const c = getCard();
      if (c) { let f = 0.55; if ((dx>0&&idx===0)||(dx<0&&idx>=cards.length)) f=0.25; c.style.transform=`translateX(${dx*f}px)`; }
      const t = Math.min(Math.abs(dx)/70,1);
      const ip=document.getElementById('ind-prev'), ix=document.getElementById('ind-next');
      if (dx>5){ip.style.opacity=String(t*0.9);ix.style.opacity='0';}
      else if(dx<-5){ix.style.opacity=String(t*0.9);ip.style.opacity='0';}
      else{ip.style.opacity='0';ix.style.opacity='0';}
    } else if (lockedDirection === 'v') {
      if (ev && ev.cancelable && ev.type === 'touchmove') ev.preventDefault();
      hasMoved = true;
      const c = getCard(); if (c) c.style.transform=`translateY(${dy*0.25}px)`;
      const t=Math.min(Math.abs(dy)/50,1);
      const iu=document.getElementById('ind-up'),id2=document.getElementById('ind-down');
      if(dy<-5){iu.style.opacity=String(t*0.9);id2.style.opacity='0';}
      else if(dy>5){id2.style.opacity=String(t*0.9);iu.style.opacity='0';}
      else{iu.style.opacity='0';id2.style.opacity='0';}
    }
  }
  function endTracking(ex, ey) {
    if (!tracking && lockedDirection !== 'h' && lockedDirection !== 'v') { lockedDirection = null; return; }
    tracking = false;
    ['ind-prev','ind-next','ind-up','ind-down'].forEach(id => document.getElementById(id).style.opacity='0');
    const c = getCard(); if (c) c.classList.remove('dragging');
    const dx=ex-startX, dy=ey-startY, dt=Date.now()-startTime;
    if (lockedDirection === 'v' && hasMoved) {
      const ok = dt<SWIPE_TIME&&Math.abs(dy)>V_VD || Math.abs(dy)>V_D;
      if (c) c.style.transform='';
      if (ok && idx<cards.length) { haptic(8); flipCard(c); }
      else if (c) { c.style.transition='transform 0.25s'; c.style.transform='translateY(0)'; setTimeout(()=>{if(c)c.style.transition='';},280); }
      lockedDirection=null; return;
    }
    const wasH = lockedDirection==='h'&&hasMoved;
    const fast = wasH&&dt<SWIPE_TIME&&Math.abs(dx)>SWIPE_VD, far = wasH&&Math.abs(dx)>SWIPE_D;
    if (wasH&&(fast||far)) {
      if (c) c.style.transform='';
      if(dx>0&&idx>0){idx--;showingBack=false;haptic(10);renderCard(-1);}
      else if(dx<0&&idx<cards.length){idx++;showingBack=false;haptic(10);renderCard(1);}
      else if(c){c.style.transition='transform 0.3s cubic-bezier(.175,.885,.32,1.275)';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},350);}
    } else {
      if(c&&wasH){c.style.transition='transform 0.25s';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}
      else if(c)c.style.transform='';
      if(lockedDirection===null&&Math.abs(dx)<TAP_T&&Math.abs(dy)<TAP_T) flipCard(c);
    }
    lockedDirection=null;
  }
  function cancelTracking() {
    tracking=false;hasMoved=false;lockedDirection=null;
    const c=getCard();
    if(c){c.classList.remove('dragging');c.style.transition='transform 0.25s';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}
    ['ind-prev','ind-next','ind-up','ind-down'].forEach(id=>document.getElementById(id).style.opacity='0');
  }
  if (window.PointerEvent) {
    vp.addEventListener('pointerdown',function(e){if(e.pointerType==='mouse'&&e.button!==0)return;if(pointerId!==null)return;if(!startTracking(e.clientX,e.clientY))return;pointerId=e.pointerId;});
    vp.addEventListener('pointermove',function(e){if(e.pointerId!==pointerId)return;moveTracking(e.clientX,e.clientY,e);});
    vp.addEventListener('pointerup',function(e){if(e.pointerId!==pointerId)return;pointerId=null;endTracking(e.clientX,e.clientY);});
    vp.addEventListener('pointercancel',function(e){if(e.pointerId!==pointerId)return;pointerId=null;cancelTracking();});
  } else {
    vp.addEventListener('touchstart',function(e){if(e.touches.length!==1)return;startTracking(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    vp.addEventListener('touchmove',function(e){if(!tracking||e.touches.length!==1)return;moveTracking(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});
    vp.addEventListener('touchend',function(e){if(!e.changedTouches||e.changedTouches.length===0)return;endTracking(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:true});
    vp.addEventListener('touchcancel',cancelTracking,{passive:true});
    let md=false;
    vp.addEventListener('mousedown',function(e){if(!startTracking(e.clientX,e.clientY))return;md=true;});
    window.addEventListener('mousemove',function(e){if(!md)return;moveTracking(e.clientX,e.clientY,e);});
    window.addEventListener('mouseup',function(e){if(!md)return;md=false;endTracking(e.clientX,e.clientY);});
  }
}

document.addEventListener('keydown', e => {
  if (isAnimating) return;
  if (e.key==='ArrowRight'&&idx>0){idx--;showingBack=false;renderCard(-1);}
  else if(e.key==='ArrowLeft'&&idx<cards.length){idx++;showingBack=false;renderCard(1);}
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();if(idx>=cards.length)restart();else if(cardEl)flipCard(cardEl);}
});

let lastTouchEnd = 0;
document.addEventListener('touchend',function(e){const now=Date.now();if(now-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=now;},{passive:false});

window.addEventListener('resize',()=>document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`));
window.addEventListener('orientationchange',()=>document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`));
document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`);

buildDots();
initInteraction();
renderCard(0);
</script>
